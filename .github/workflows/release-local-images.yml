name: Release Local Stack Images

# Builds the four images the local-stack installer (lemma-stack) consumes,
# pushes them to ghcr.io, and attaches a release manifest (lemma-local.json)
# to the GitHub release. lemma-stack resolves:
#   stable  -> releases/latest/download/lemma-local.json
#   <X.Y.Z> -> releases/download/v<X.Y.Z>/lemma-local.json
#
# Multi-arch is built on NATIVE runners (amd64 on ubuntu-latest, arm64 on
# ubuntu-24.04-arm) and merged into a manifest list. Building arm64 natively
# instead of under QEMU emulation cuts the frontend build from ~20 min to a
# few minutes (an emulated Next.js build is pathologically slow).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.0). Uses tag v<version>."
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

permissions:
  contents: write
  packages: write

concurrency:
  group: release-local-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.image.name }} (${{ matrix.platform.arch }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: lemma-backend
            context: .
            dockerfile: lemma-backend/Dockerfile
          - name: lemma-frontend
            context: .
            dockerfile: lemma-frontend/Dockerfile
          - name: lemma-agentbox
            context: agentbox
            dockerfile: agentbox/Dockerfile
          - name: lemma-agentbox-runtime
            context: .
            dockerfile: agentbox/Dockerfile.runtime
        platform:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/${{ matrix.platform.arch }}
          # Push by digest only; the merge job assembles the tagged manifest list.
          outputs: type=image,name=${{ env.IMAGE_PREFIX }}/${{ matrix.image.name }},push-by-digest=true,name-canonical=true,push=true
          # Per-(image, arch) cache scope so the two arch builds never clobber
          # each other's cache. Layer reuse keys on the Dockerfile COPY order:
          # npm ci / uv sync layers stay cached until package-lock / uv.lock changes.
          cache-from: type=gha,scope=${{ matrix.image.name }}-${{ matrix.platform.arch }}
          cache-to: type=gha,scope=${{ matrix.image.name }}-${{ matrix.platform.arch }},mode=max

      - name: Export digest
        shell: bash
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.image.name }}-${{ matrix.platform.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        image:
          - lemma-backend
          - lemma-frontend
          - lemma-agentbox
          - lemma-agentbox-runtime
    steps:
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version="${GITHUB_REF#refs/tags/v}"
          else
            version="${{ inputs.version }}"
          fi
          version="${version#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-${{ matrix.image }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest list
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:v${{ steps.version.outputs.version }} \
            -t ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:latest \
            $(printf '${{ env.IMAGE_PREFIX }}/${{ matrix.image }}@sha256:%s ' *)

      - name: Record merged digest
        id: digest
        shell: bash
        working-directory: /tmp/digests
        run: |
          mkdir -p digests-out
          d=$(docker buildx imagetools inspect \
            "${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:v${{ steps.version.outputs.version }}" \
            --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "{\"name\": \"${{ matrix.image }}\", \"digest\": \"$d\"}" > "digests-out/${{ matrix.image }}.json"

      - name: Upload merged digest
        uses: actions/upload-artifact@v4
        with:
          name: merged-digest-${{ matrix.image }}
          path: /tmp/digests/digests-out/${{ matrix.image }}.json
          retention-days: 1

  manifest:
    name: Publish release manifest
    runs-on: ubuntu-latest
    needs: merge
    steps:
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version="${GITHUB_REF#refs/tags/v}"
          else
            version="${{ inputs.version }}"
          fi
          version="${version#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Download merged digests
        uses: actions/download-artifact@v4
        with:
          pattern: merged-digest-*
          path: digests
          merge-multiple: true

      - name: Generate lemma-local.json
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          PREFIX: ${{ env.IMAGE_PREFIX }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          version = os.environ["VERSION"]
          prefix = os.environ["PREFIX"]
          digests = {}
          for path in Path("digests").glob("*.json"):
              entry = json.loads(path.read_text())
              digests[entry["name"]] = entry["digest"]

          def image(name: str) -> dict:
              return {"ref": f"{prefix}/{name}:v{version}", "digest": digests[name]}

          manifest = {
              "schema_version": 1,
              "version": version,
              "released_at": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "min_admin_version": "0.1.0",
              "images": {
                  "backend": image("lemma-backend"),
                  "frontend": image("lemma-frontend"),
                  "agentbox": image("lemma-agentbox"),
                  "agentbox_runtime": image("lemma-agentbox-runtime"),
              },
              "infra": {
                  "postgres": "docker.io/pgvector/pgvector:0.8.3-pg16",
                  "redis": "docker.io/redis/redis-stack:7.2.0-v19",
                  "supertokens": "docker.io/supertokens/supertokens-postgresql:11.1.0",
                  "kreuzberg": "ghcr.io/kreuzberg-dev/kreuzberg:4.9.9",
              },
          }
          Path("lemma-local.json").write_text(json.dumps(manifest, indent=2) + "\n")
          print(json.dumps(manifest, indent=2))
          PY

      - name: Attach manifest to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: lemma-local.json
          generate_release_notes: true
